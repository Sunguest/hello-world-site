<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub YouTube Surfer Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #181818;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ff0000; /* YouTube Red */
            margin-bottom: 10px;
        }
        
        /* Search Bar Styles */
        .search-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .search-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 24px;
            border: 1px solid #3c3c3c;
            background-color: #121212;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .search-input:focus {
            border-color: #3ea6ff; /* YouTube Link Blue */
        }
        .search-button {
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            background-color: #cc0000;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-button:hover {
            background-color: #ff0000;
        }

        /* Video Player Styles */
        .video-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            border-radius: 8px;
        }

        /* Presets Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            background: #212121;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #383838;
            transition: background 0.2s;
        }
        .card:hover {
            background: #383838;
        }
    </style>
</head>
<body>

    <h1>GitHub Video Surfer Pro</h1>
    <p style="color: #aaa; margin-top: 0; margin-bottom: 20px;">Paste any YouTube link or Video ID below to watch it instantly.</p>

    <div class="search-container">
        <input type="text" id="video-search" class="search-input" placeholder="Paste YouTube Link (e.g., https://www.youtube.com/watch?v=...) or Video ID">
        <button class="search-button" onclick="loadSearchedVideo()">Load</button>
    </div>

    <div class="video-container">
        <div class="video-wrapper">
            <iframe id="main-player" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
    </div>

    <h3>Quick Presets:</h3>
    
    <div class="grid">
        <div class="card" onclick="changeVideo('dQw4w9WgXcQ')">Rick Astley</div>
        <div class="card" onclick="changeVideo('jfKfPfyJRdk')">Lofi Hip Hop Radio</div>
        <div class="card" onclick="changeVideo('tgbNymZ7vqY')">Muppets Mahna Mahna</div>
        <div class="card" onclick="changeVideo('9bZkp7q19f0')">PSY - GANGNAM STYLE</div>
    </div>

    <script>
        // Core function to switch the iframe player source
        function changeVideo(videoId) {
            const player = document.getElementById('main-player');
            player.src = "https://www.youtube.com/embed/" + videoId;
        }

        // Logic to extract the ID from a full link and load it
        function loadSearchedVideo() {
            const inputVal = document.getElementById('video-search').value.trim();
            
            if (!inputVal) return;

            let videoId = inputVal;

            // Check if the user pasted a full YouTube URL
            if (inputVal.includes('youtube.com') || inputVal.includes('youtu.be')) {
                // Regex pattern to extract the 11-character video ID from various YouTube URL formats
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = inputVal.match(regExp);
                
                if (match && match.length === 11) {
                    videoId = match;
                } else {
                    alert("Could not extract a valid YouTube Video ID. Please check your link.");
                    return;
                }
            }

            // Load the video using the extracted ID
            changeVideo(videoId);
        }

        // Optional: Allow pressing "Enter" key to search
        document.getElementById('video-search').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadSearchedVideo();
            }
        });
    </script>

</body>
</html>
